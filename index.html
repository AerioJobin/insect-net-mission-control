    <style>
        :root {
            --primary:   #8A2245;
            --secondary: #6b1a36;
            --accent:    #c44569;
            --bg:        #0e0c11;
            --surface:   #19161f;
            --surface2:  #231f2b;
            --border:    #38334a;
            --text:      #e8e0ec;
            --text-dim:  #9a8fa8;
            --glow:      rgba(196, 69, 105, 0.35);
            --radius:    20px;
            --tr:        0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Animated background ── */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(138,34,69,0.22) 0%, transparent 65%),
                        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(196,69,105,0.12) 0%, transparent 60%),
                        radial-gradient(ellipse 50% 40% at 20% 70%, rgba(107,26,54,0.15) 0%, transparent 55%),
                        #0e0c11;
        }

        /* dot grid */
        .bg-canvas::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.055) 1px, transparent 1px);
            background-size: 28px 28px;
        }

        /* floating glow orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            animation: orbFloat 14s ease-in-out infinite;
        }
        .orb-1 {
            width: 520px; height: 520px;
            background: radial-gradient(circle, rgba(138,34,69,0.28), transparent 70%);
            top: -120px; left: -100px;
            animation-duration: 16s;
        }
        .orb-2 {
            width: 380px; height: 380px;
            background: radial-gradient(circle, rgba(196,69,105,0.18), transparent 70%);
            bottom: -80px; right: -80px;
            animation-duration: 12s;
            animation-delay: -5s;
        }
        .orb-3 {
            width: 260px; height: 260px;
            background: radial-gradient(circle, rgba(107,26,54,0.22), transparent 70%);
            top: 40%; left: 60%;
            animation-duration: 20s;
            animation-delay: -9s;
        }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%       { transform: translate(30px, -20px) scale(1.05); }
            66%       { transform: translate(-20px, 15px) scale(0.97); }
        }

        /* ── Landing card ── */
        .landing {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0;
            padding: 24px;
            animation: fadeUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: none; }
        }

        /* Logo pill */
        .logo-pill {
            display: flex;
            align-items: center;
            gap: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 10px 22px;
            margin-bottom: 40px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(196,69,105,0.1);
            animation: fadeUp 0.8s 0.05s both;
        }
        .logo-pill img {
            height: 44px;
            width: auto;
            object-fit: contain;
            filter: none;
        }
        .logo-sep {
            width: 1px;
            height: 36px;
            background: var(--border);
            margin: 0 18px;
            flex-shrink: 0;
        }

        /* Title */
        .title {
            font-family: 'Space Mono', monospace;
            font-size: clamp(3em, 8vw, 6em);
            font-weight: 700;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #e8e0ec 0%, var(--accent) 50%, #c44569 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
            margin-bottom: 16px;
            animation: fadeUp 0.8s 0.1s both;
        }

        .subtitle {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(0.75em, 2vw, 0.95em);
            letter-spacing: 3px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 20px;
            animation: fadeUp 0.8s 0.15s both;
        }

        /* Status badges */
        .badges {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 52px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeUp 0.8s 0.2s both;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72em;
            font-weight: 600;
            padding: 5px 14px;
            border-radius: 99px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }
        .badge.live { border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.08); color: #4ade80; }
        .badge.ai   { border-color: rgba(196,69,105,0.3); background: rgba(196,69,105,0.08); color: var(--accent); }
        .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

        /* CTA Button */
        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: #fff;
            text-decoration: none;
            font-family: 'Outfit', sans-serif;
            font-size: 1.05em;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 18px 52px;
            border-radius: 99px;
            box-shadow: 0 8px 32px rgba(138,34,69,0.45), 0 0 0 1px rgba(255,255,255,0.06) inset;
            transition: all var(--tr);
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.8s 0.25s both;
        }
        .cta-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }
        .cta-btn:hover::before { transform: translateX(100%); }
        .cta-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 48px rgba(138,34,69,0.55), 0 0 0 1px rgba(255,255,255,0.1) inset;
        }
        .cta-btn:active { transform: translateY(-1px); }
        .cta-arrow { font-size: 1.1em; transition: transform 0.3s; }
        .cta-btn:hover .cta-arrow { transform: translateX(4px); }

        /* Login link */
        .login-link {
            margin-top: 28px;
            font-size: 0.82em;
            color: var(--text-dim);
            animation: fadeUp 0.8s 0.3s both;
        }
        .login-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .login-link a:hover { border-bottom-color: var(--accent); }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 24px;
            left: 0; right: 0;
            z-index: 1;
            text-align: center;
            font-size: 0.72em;
            color: var(--text-dim);
            letter-spacing: 1px;
            opacity: 0.7;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .logo-pill img { height: 34px; }
            .cta-btn { padding: 16px 36px; font-size: 0.95em; }
        }
